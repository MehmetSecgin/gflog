name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  macos-arm64:
    name: build · package · release (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --release
      - name: package
        run: |
          asset="gflog-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
          tar -czf "$asset" -C target/release gflog
          shasum -a 256 "$asset" | tee "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"
      - name: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$ASSET" "$ASSET.sha256" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
