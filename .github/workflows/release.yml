name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: version · build · package · release (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: resolve next version
        id: v
        shell: bash
        run: |
          set -euo pipefail
          cargo_ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          tag_ver="${latest_tag#v}"; [ -z "$latest_tag" ] && tag_ver="0.0.0"
          higher=$(printf '%s\n%s\n' "$cargo_ver" "$tag_ver" | sort -V | tail -n1)
          if [ "$cargo_ver" != "$tag_ver" ] && [ "$higher" = "$cargo_ver" ] && ! git rev-parse "v$cargo_ver" >/dev/null 2>&1; then
            next="$cargo_ver"            # honor a manual bump in Cargo.toml (e.g. a major)
          else
            IFS=. read -r MA MI PA <<<"$higher"
            next="$MA.$((MI + 1)).0"     # otherwise auto-bump minor
          fi
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          echo "releasing v$next (cargo=$cargo_ver, latest_tag=${latest_tag:-none})"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: stamp version
        shell: bash
        env:
          NEXT: ${{ steps.v.outputs.next }}
        run: |
          set -euo pipefail
          perl -i -pe 'if (!$seen && s/^version = "[^"]+"/version = "$ENV{NEXT}"/) { $seen = 1 }' Cargo.toml
          grep -q "^version = \"$NEXT\"$" Cargo.toml || { echo "version stamp did not apply"; exit 1; }
          cargo update -p gflog --precise "$NEXT"
      - name: build
        run: cargo build --release --locked
      - name: commit version bump
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "no version changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "release ${{ steps.v.outputs.tag }} [skip ci]"
          git push origin HEAD:main
      - name: package
        run: |
          asset="gflog-${{ steps.v.outputs.tag }}-aarch64-apple-darwin.tar.gz"
          tar -czf "$asset" -C target/release gflog
          shasum -a 256 "$asset" | tee "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"
      - name: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.v.outputs.tag }}" \
            "$ASSET" "$ASSET.sha256" \
            --target "$(git rev-parse HEAD)" \
            --title "${{ steps.v.outputs.tag }}" \
            --generate-notes
